name: Jira Issue Sync - Close GitHub Issue

on:
  repository_dispatch:
    types: [jira-issue-updated]

jobs:
  close-github-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: GitHub Issue 닫기
        uses: actions/github-script@v7
        with:
          script: |
            const issueKey = context.payload.client_payload.issue_key;
            const jiraStatus = context.payload.client_payload.status;

            if (!issueKey || !jiraStatus) {
              core.warning('issue_key 또는 status가 payload에 없습니다.');
              return;
            }

            // 완료 상태가 아닐 경우 종료
            const doneStatuses = ['Done', '완료', 'Closed', 'Resolved'];
            if (!doneStatuses.includes(jiraStatus)) {
              core.info(`현재 상태(${jiraStatus})는 완료 상태가 아니므로 종료합니다.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Jira Key가 포함된 GitHub Issue 검색
            const query = `repo:${owner}/${repo} "${issueKey}" in:body is:issue is:open`;

            const searchResult = await github.rest.search.issuesAndPullRequests({
              q: query
            });

            if (searchResult.data.items.length === 0) {
              core.warning(`Jira Key(${issueKey})에 해당하는 열린 GitHub Issue를 찾을 수 없습니다.`);
              return;
            }

            const issueNumber = searchResult.data.items[0].number;

            // GitHub Issue 닫기
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: 'closed'
            });

            // 완료 코멘트 추가
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: `Jira 이슈 **${issueKey}** 가 완료되어 자동으로 닫힙니다.`
            });

            core.info(`GitHub Issue #${issueNumber}가 성공적으로 닫혔습니다.`);
